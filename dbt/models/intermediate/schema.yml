version: 2

models:
  - name: int_customer_mrr_monthly
    description: >
      Contracted MRR aggregated to customer x month grain (sums across subscriptions —
      a customer could in principle hold more than one). Only months where the customer
      had active MRR appear; absence of a row means zero MRR that month.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - customer_id
              - month_date
    columns:
      - name: customer_id
        description: Customer this MRR belongs to.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: month_date
        description: First-of-month date this MRR applies to.
        tests:
          - not_null
      - name: mrr_amount
        description: Total contracted MRR for this customer in this month.
        tests:
          - not_null

  - name: int_revenue_recognized_monthly
    description: >
      Recognized revenue aggregated to customer x month grain, keyed by the month
      revenue was actually recognized (not the month it was contractually billed for).
      Diverges from int_customer_mrr_monthly only when an invoice was processed late.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - customer_id
              - month_date
    columns:
      - name: customer_id
        description: Customer this recognized revenue belongs to.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: month_date
        description: First-of-month date revenue was recognized in.
        tests:
          - not_null
      - name: recognized_revenue
        description: Total revenue recognized for this customer in this month.
        tests:
          - not_null

  - name: int_customer_mrr_bridge_monthly
    description: >
      Customer x month MRR bridge: current vs. prior-month MRR and a naive bridge
      category (new/expansion/contraction/churn/no_change) computed purely from MRR
      deltas, with no awareness of contract-transfer events. Built on a gapless
      calendar spine that extends one month past each customer's last active month so
      a drop to zero MRR shows up as an explicit churn row. By design this naive
      logic mislabels contract transfers as churn + new — see seed/events.md Event 2
      and fct_contract_events for the correction.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - customer_id
              - month_date
    columns:
      - name: customer_id
        description: Customer this bridge row belongs to.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: month_date
        description: First-of-month date this bridge row applies to.
        tests:
          - not_null
      - name: current_mrr
        description: MRR for this customer in this month (0 if inactive).
        tests:
          - not_null
      - name: prior_mrr
        description: MRR for this customer in the prior calendar month (0 if inactive or no prior month in the spine).
        tests:
          - not_null
      - name: mrr_delta
        description: current_mrr minus prior_mrr.
        tests:
          - not_null
      - name: bridge_category
        description: "Naive MRR movement category: new, expansion, contraction, churn, or no_change."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["new", "expansion", "contraction", "churn", "no_change"]
